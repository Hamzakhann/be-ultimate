version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: fintech_redis
    ports:
      - '6379:6379'
  postgres:
    image: postgres:15
    container_name: fintech_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fintech_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

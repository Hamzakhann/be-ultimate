# ─────────────────────────────────────────────
# Fintech Logstash Pipeline
# Reads from Kafka topic `transaction.events`
# and indexes into Elasticsearch.
# ─────────────────────────────────────────────

input {
  # 1. Transactional Data from Kafka
  kafka {
    bootstrap_servers => "kafka:9092"
    topics            => ["transaction.events"]
    codec             => "json"
    group_id          => "logstash-fintech-consumer"
    auto_offset_reset => "earliest"
    tags              => ["transaction_event"]
  }

  # 2. Application Logs from Services via TCP JSON
  tcp {
    port  => 5044
    codec => json
    tags  => ["app_log"]
  }
}

filter {
  # ONLY apply mapping mutates to standard Transactional Data events
  if "transaction_event" in [tags] {
    mutate {
      rename => {
        "userId"      => "sender_id"
        "eventType"   => "event_type"
      }
    }
    date {
      match   => ["timestamp", "ISO8601"]
      target  => "timestamp"
    }
    mutate {
      remove_field => ["@version", "event", "headers"]
    }
  }

  # Application log preprocessing (standardizing timestamp if present)
  if "app_log" in [tags] {
    date {
      match  => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }
  }
}

output {
  if "transaction_event" in [tags] {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "fintech-transactions"
      document_id => "%{id}"
    }
  }

  if "app_log" in [tags] {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "logs-fintech-%{+YYYY.MM.dd}"
    }
  }

  # Always helpful during dev
  stdout { codec => rubydebug }
}

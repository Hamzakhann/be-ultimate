# ─────────────────────────────────────────────
# Fintech Logstash Pipeline
# Reads from Kafka topic `transaction.events`
# and indexes into Elasticsearch.
# ─────────────────────────────────────────────

input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics            => ["transaction.events"]
    codec             => "json"
    group_id          => "logstash-fintech-consumer"
    auto_offset_reset => "earliest"
  }
}

filter {
  # Rename fields to match the ES mapping
  mutate {
    rename => {
      "userId"      => "sender_id"
      "eventType"   => "event_type"
    }
  }

  # Parse ISO timestamp string → ES date type
  date {
    match   => ["timestamp", "ISO8601"]
    target  => "timestamp"
  }

  # Drop Kafka metadata noise
  mutate {
    remove_field => ["@version", "event", "headers"]
  }
}

output {
  elasticsearch {
    hosts     => ["http://elasticsearch:9200"]
    index     => "fintech-transactions"
    # Use the document id from the event for idempotency
    document_id => "%{id}"
  }

  # Mirror to stdout while developing (remove in production)
  stdout { codec => rubydebug }
}
